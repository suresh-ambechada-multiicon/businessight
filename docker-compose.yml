x-backend-environment: &backend-environment
  SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
  DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-businessdatasight}
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  DEBUG: ${DEBUG:-False}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://localhost:5173}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://localhost:5173}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-businessdatasight}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-businessdatasight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: businessdatasight-backend:${APP_IMAGE_TAG:-latest}
    build:
      context: ./backend
    restart: "no"
    command: ["uv", "run", "python", "manage.py", "migrate", "--noinput"]
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    image: businessdatasight-backend:${APP_IMAGE_TAG:-latest}
    build:
      context: ./backend
    restart: unless-stopped
    init: true
    command: ["uv", "run", "gunicorn", "BusinessSight.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--threads", "2"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/models/', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  celery:
    image: businessdatasight-backend:${APP_IMAGE_TAG:-latest}
    build:
      context: ./backend
    restart: unless-stopped
    init: true
    command: ["uv", "run", "celery", "-A", "BusinessSight", "worker", "-l", "info", "--concurrency=${CELERY_CONCURRENCY:-4}", "--hostname=worker@%h"]
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run celery -A BusinessSight inspect ping -d worker@$$HOSTNAME --timeout=5 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: businessdatasight-frontend:${APP_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    init: true
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
